<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Curso — ASSENT AGÊNCIA</title>
<script type="module" src="/navbar.js"></script>
<script type="module" src="/sidebar.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
/* ════════════════════════════════════════
   TOKENS DE DESIGN — alinhados com membros
════════════════════════════════════════ */
:root {
  --bg:          #000000;
  --surface:     #0d0d0d;
  --surface2:    #141414;
  --surface3:    #1c1c1c;
  --gold:        #C9A84C;
  --gold-dim:    #a8883a;
  --gold-glow:   rgba(201,168,76,0.15);
  --gold-line:   rgba(201,168,76,0.3);
  --white:       #FFFFFF;
  --muted:       #666666;
  --muted2:      #444444;
  --border:      rgba(255,255,255,0.06);
  --border2:     rgba(255,255,255,0.1);
  --success:     #27ae60;
  --danger:      #c0392b;
  --heading:     'Montserrat', sans-serif;
  --body:        'Inter', sans-serif;
  --nav-h:       68px;
  --sidebar:     240px;
  --sidebar-collapsed: 64px;
  --sidebar-w:   320px;
  --header-h:    56px;
  --r:           10px;
  --r-lg:        16px;
}

*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
  background:var(--bg); color:var(--white);
  font-family:var(--body); min-height:100vh;
  overflow-x:hidden; line-height:1.6;
}
::-webkit-scrollbar{ width:4px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:var(--surface3); border-radius:2px; }
img{ display:block; }
a{ text-decoration:none; color:inherit; }

/* ── WRAPPER — recua do assent-sidebar ── */
.content-wrap{
  margin-left: var(--sidebar);
  transition: margin-left .3s cubic-bezier(.4,0,.2,1);
}

/* ── LOADING ── */
#loading-screen{
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:20px;
  transition:opacity .4s ease;
}
#loading-screen.hide{ opacity:0; pointer-events:none; }
.loading-logo{
  font-family:var(--heading); font-weight:800;
  font-size:1.4rem; letter-spacing:.08em;
}
.loading-logo span{ color:var(--gold); }
.spinner{
  width:32px; height:32px;
  border:2px solid var(--surface3); border-top-color:var(--gold);
  border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

/* ── TOAST ── */
.toast{
  position:fixed; bottom:24px; right:24px; z-index:9999;
  background:rgba(13,13,13,0.9); border:1px solid var(--border2);
  border-radius:var(--r); padding:13px 18px;
  font-size:.875rem; color:var(--white);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  transform:translateY(20px); opacity:0;
  transition:all .3s ease; pointer-events:none;
  display:flex; align-items:center; gap:10px; max-width:300px;
}
.toast.show{ transform:translateY(0); opacity:1; }
.toast.ok{ border-color:rgba(39,174,96,.3); }
.toast.err{ border-color:rgba(192,57,43,.3); }
.toast-icon-wrap{ display:flex; align-items:center; flex-shrink:0; }
.toast.ok  .toast-icon-wrap{ color:#6fcf97; }
.toast.err .toast-icon-wrap{ color:#e87070; }

/* ══════════════════════════════════════
   VIEW: ERRO
══════════════════════════════════════ */
#view-erro{
  display:none; align-items:center; justify-content:center;
  flex-direction:column; text-align:center; padding:60px 24px;
  min-height:100vh;
  background:radial-gradient(ellipse at 50% 0%, rgba(201,168,76,.06) 0%, transparent 60%), var(--bg);
}
#view-erro.active{ display:flex; }
.erro-icon{
  width:80px; height:80px; border-radius:50%;
  background:rgba(201,168,76,.08); border:1px solid rgba(201,168,76,.2);
  display:flex; align-items:center; justify-content:center;
  color:var(--gold); margin-bottom:24px;
}
.erro-title{
  font-family:var(--heading); font-size:1.5rem; font-weight:800;
  letter-spacing:-.02em; margin-bottom:10px;
}
.erro-sub{
  color:var(--muted); font-size:.9rem; max-width:400px;
  margin-bottom:32px; line-height:1.7;
}
.btn-voltar-lista{
  display:inline-flex; align-items:center; gap:8px;
  padding:12px 28px; border-radius:50px;
  background:var(--gold); color:#000;
  font-family:var(--heading); font-size:.8rem; font-weight:700;
  letter-spacing:.07em; text-transform:uppercase;
  transition:all .2s; box-shadow:0 0 24px var(--gold-glow);
}
.btn-voltar-lista:hover{ background:var(--gold-dim); transform:translateY(-2px); }

/* ══════════════════════════════════════
   VIEW: PLAYER
══════════════════════════════════════ */
#view-player{
  display:none; flex-direction:column;
  min-height:100vh;
}
#view-player.active{ display:flex; }

/* ── Header do player ── */
.player-header{
  position:sticky; top:0; z-index:100;
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 24px; height:var(--header-h);
  display:flex; align-items:center; gap:16px;
  flex-shrink:0;
}
.btn-back{
  background:none; border:none; color:var(--muted);
  font-family:var(--body); font-size:.82rem; font-weight:500;
  cursor:pointer; display:flex; align-items:center; gap:7px;
  transition:color .2s; padding:0; flex-shrink:0;
  text-decoration:none; letter-spacing:.03em;
}
.btn-back:hover{ color:var(--white); }
.btn-back svg{ width:16px; height:16px; }

.header-sep{ width:1px; height:20px; background:var(--border2); flex-shrink:0; }
.player-curso-titulo{
  font-family:var(--heading); font-size:.85rem; font-weight:700;
  letter-spacing:.01em; flex:1; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
}
.player-progress-wrap{ display:flex; align-items:center; gap:10px; flex-shrink:0; }
.player-progress-bar{ width:120px; height:4px; background:var(--surface3); border-radius:2px; }
.player-progress-fill{ height:100%; background:var(--gold); border-radius:2px; transition:width .4s; }
.player-progress-pct{ font-size:.75rem; color:var(--gold); font-weight:700; white-space:nowrap; }

/* Botão toggle sidebar mobile */
.btn-toggle-sidebar{
  display:none; background:none; border:1px solid var(--border2);
  border-radius:var(--r); padding:7px 12px; color:var(--muted);
  font-size:.78rem; font-weight:600; cursor:pointer;
  align-items:center; gap:6px; letter-spacing:.04em;
  flex-shrink:0; font-family:var(--body); transition:all .2s;
}
.btn-toggle-sidebar:hover{ border-color:var(--gold-line); color:var(--gold); }
.btn-toggle-sidebar svg{ width:14px; height:14px; }

/* ── Layout principal ── */
.player-layout{
  display:flex; flex:1;
  height:calc(100vh - var(--header-h));
  overflow:hidden;
}

/* ── Sidebar de aulas ── */
.player-sidebar{
  width:var(--sidebar-w); flex-shrink:0;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}

.sidebar-scroll{ flex:1; overflow-y:auto; }
.sidebar-scroll::-webkit-scrollbar{ width:4px; }
.sidebar-scroll::-webkit-scrollbar-thumb{ background:var(--surface3); border-radius:2px; }

.sidebar-header{
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  font-size:.72rem; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted);
  flex-shrink:0; font-family:var(--heading);
}

/* Item de aula na sidebar */
.aula-sidebar-item{
  padding:14px 20px 14px 16px;
  display:flex; align-items:flex-start; gap:12px;
  cursor:pointer; transition:background .15s;
  border-left:3px solid transparent;
  border-bottom:1px solid var(--border);
}
.aula-sidebar-item:hover{ background:var(--surface2); }
.aula-sidebar-item.ativa{
  background:rgba(201,168,76,.06);
  border-left-color:var(--gold);
}
.aula-sidebar-item.completa .aula-sidebar-titulo{ color:var(--muted); }
.aula-sidebar-item.ativa .aula-sidebar-titulo{ color:var(--gold); }

.aula-sidebar-num{
  width:26px; height:26px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:.72rem; font-weight:700; margin-top:1px;
  background:var(--surface3); color:var(--muted);
  transition:background .2s, color .2s;
}
.aula-sidebar-item.ativa .aula-sidebar-num{
  background:var(--gold); color:#000;
}
.aula-sidebar-item.completa .aula-sidebar-num{
  background:rgba(39,174,96,.15); color:#6fcf97;
}

.aula-sidebar-info{ flex:1; min-width:0; }
.aula-sidebar-titulo{
  font-size:.82rem; font-weight:500; color:var(--white);
  line-height:1.4;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.aula-sidebar-meta{ font-size:.72rem; color:var(--muted); margin-top:3px; }

/* ── Main (vídeo + info) ── */
.player-main{
  flex:1; overflow-y:auto; display:flex; flex-direction:column;
}
.player-main::-webkit-scrollbar{ width:4px; }
.player-main::-webkit-scrollbar-thumb{ background:var(--surface3); border-radius:2px; }

/* Vídeo */
.video-container{ width:100%; background:#000; }
.video-aspect{ position:relative; padding-bottom:56.25%; height:0; }
.video-aspect iframe{
  position:absolute; inset:0; width:100%; height:100%; border:none;
}
.video-placeholder{
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; color:var(--muted);
  background:linear-gradient(135deg, #000 0%, var(--surface) 100%);
}
.video-placeholder svg{ width:48px; height:48px; opacity:.2; }
.video-placeholder p{ font-size:.875rem; }

/* Info da aula */
.aula-info{ padding:28px 36px 40px; flex:1; }
.aula-info-breadcrumb{
  font-size:.75rem; color:var(--muted); margin-bottom:12px;
  display:flex; align-items:center; gap:6px;
}
.aula-info-breadcrumb::before{
  content:''; width:3px; height:12px;
  background:var(--gold); border-radius:2px; display:block;
}
.aula-info-titulo{
  font-family:var(--heading); font-size:1.15rem; font-weight:800;
  letter-spacing:-.01em; margin-bottom:10px; line-height:1.35;
}
.aula-info-desc{
  color:var(--muted); font-size:.875rem; line-height:1.7;
  margin-bottom:28px; max-width:680px;
}

/* Controles prev/next + marcar concluída */
.player-controls{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.btn-ctrl{
  display:inline-flex; align-items:center; gap:8px;
  padding:11px 22px; border-radius:50px;
  font-family:var(--heading); font-size:.78rem; font-weight:700;
  letter-spacing:.06em; text-transform:uppercase;
  cursor:pointer; transition:all .2s; border:none;
}
.btn-ctrl:disabled{ opacity:.35; cursor:not-allowed; transform:none !important; }
.btn-ctrl svg{ width:15px; height:15px; }

.btn-prev,.btn-next{
  background:var(--surface2); color:var(--white);
  border:1px solid var(--border2) !important;
}
.btn-prev:hover:not(:disabled),.btn-next:hover:not(:disabled){
  border-color:rgba(255,255,255,.22) !important;
}
.btn-complete{
  background:var(--gold); color:#000;
  box-shadow:0 0 24px var(--gold-glow);
}
.btn-complete:hover:not(:disabled){ background:var(--gold-dim); transform:translateY(-1px); }
.btn-complete.done{
  background:rgba(39,174,96,.1); color:#6fcf97;
  border:1px solid rgba(39,174,96,.25) !important; box-shadow:none;
}
.btn-complete.done:hover:not(:disabled){ background:rgba(39,174,96,.15); }

/* ── RESPONSIVE ── */
@media (max-width:900px) {
  .content-wrap{ margin-left:0; }
  .player-header{ padding:0 16px; gap:12px; }
  .player-progress-wrap{ display:none; }
  .btn-toggle-sidebar{ display:inline-flex; }
  .player-layout{ height:auto; flex-direction:column; overflow:visible; }

  .player-sidebar{
    position:fixed;
    top:var(--header-h);
    left:0; right:0; bottom:0;
    width:100%; z-index:200;
    transform:translateX(-100%);
    transition:transform .3s ease;
  }
  .player-sidebar.open{ transform:translateX(0); }

  .player-main{ min-height:calc(100vh - var(--header-h)); }
  .aula-info{ padding:20px 20px 36px; }
}

@media (max-width:640px) {
  .player-curso-titulo{ display:none; }
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="loading-logo">ASSENT <span>CURSOS</span></div>
  <div class="spinner"></div>
</div>

<div class="content-wrap">

<!-- ══════════════════════════════════════
     VIEW: ERRO
══════════════════════════════════════ -->
<div id="view-erro">
  <div class="erro-icon" id="erro-icon">
    <!-- substituído via JS -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="32" height="32"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  </div>
  <div class="erro-title" id="erro-title">Curso não encontrado</div>
  <div class="erro-sub" id="erro-sub">O curso que você tentou acessar não existe ou foi removido.</div>
  <a href="/cursos" class="btn-voltar-lista">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Voltar aos cursos
  </a>
</div>

<!-- ══════════════════════════════════════
     VIEW: PLAYER
══════════════════════════════════════ -->
<div id="view-player">

  <!-- Header fixo do player -->
  <div class="player-header">
    <a href="/cursos" class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Cursos
    </a>
    <div class="header-sep"></div>
    <div class="player-curso-titulo" id="player-curso-titulo">—</div>

    <!-- Barra de progresso (desktop) -->
    <div class="player-progress-wrap">
      <div class="player-progress-bar">
        <div class="player-progress-fill" id="player-progress-fill" style="width:0%"></div>
      </div>
      <span class="player-progress-pct" id="player-progress-pct">0%</span>
    </div>

    <!-- Toggle sidebar mobile -->
    <button class="btn-toggle-sidebar" id="btn-toggle-sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Aulas
    </button>
  </div>

  <!-- Layout: sidebar + main -->
  <div class="player-layout">

    <!-- ── Sidebar de aulas ── -->
    <div class="player-sidebar" id="player-sidebar">
      <div class="sidebar-header" id="sidebar-header">Aulas</div>
      <div class="sidebar-scroll">
        <div id="aulas-sidebar-list">
          <div style="padding:30px;text-align:center;">
            <div class="spinner" style="margin:0 auto;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Main: vídeo + info ── -->
    <div class="player-main">

      <!-- Vídeo -->
      <div class="video-container">
        <div class="video-aspect">
          <iframe
            id="youtube-player"
            style="display:none;"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
            title="Vídeo da aula">
          </iframe>

          <div class="video-placeholder" id="video-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="23 7 16 12 23 17 23 7"/>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
            <p id="placeholder-msg">Selecione uma aula para começar</p>
          </div>
        </div>
      </div>

      <!-- Info da aula + controles -->
      <div class="aula-info">
        <div class="aula-info-breadcrumb" id="aula-info-breadcrumb"></div>
        <div class="aula-info-titulo" id="aula-info-titulo">Bem-vindo ao curso</div>
        <div class="aula-info-desc" id="aula-info-desc">Selecione uma aula na lista ao lado para começar.</div>

        <div class="player-controls">
          <button class="btn-ctrl btn-prev" id="btn-prev" disabled onclick="navAula(-1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Anterior
          </button>
          <button class="btn-ctrl btn-complete" id="btn-complete" disabled onclick="marcarConcluida()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Marcar como concluída
          </button>
          <button class="btn-ctrl btn-next" id="btn-next" disabled onclick="navAula(1)">
            Próxima
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>

    </div><!-- /player-main -->
  </div><!-- /player-layout -->
</div><!-- /view-player -->

</div><!-- /content-wrap -->

<!-- ── TOAST ── -->
<div class="toast" id="toast">
  <span class="toast-icon-wrap" id="toast-icon"></span>
  <span id="toast-msg"></span>
</div>

<script>
/* ════════════════════════════════════════
   ÍCONES SVG
════════════════════════════════════════ */
const ICONS = {
  warn:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="32" height="32"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  lock:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="32" height="32"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
  search: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="32" height="32"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  inbox:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="32" height="32"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>`,
  tool:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="32" height="32"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`,
  check:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg>`,
};

/* ════════════════════════════════════════
   ESTADO
════════════════════════════════════════ */
let _user           = null;
let _licenca        = {};
let _curso          = null;
let _aulas          = [];
let _aulaAtiva      = null;
let _progresso      = { aulasCompletas: [], aulaAtual: null };
let _authProcessado = false;
let _sidebarOpen    = false;

/* ════════════════════════════════════════
   SIDEBAR — AssentSidebar
════════════════════════════════════════ */
function initSidebar() {
  if (typeof window.AssentSidebar === 'undefined') {
    setTimeout(initSidebar, 50);
    return;
  }
  window.AssentSidebar.init({
    activePage: 'cursos',
    onLogout: () => { window.location.href = '/membros'; },
  });
}

/* ════════════════════════════════════════
   HELPER: Extrai YouTube ID
════════════════════════════════════════ */
function extrairYouTubeId(url) {
  if (!url) return null;
  const patterns = [
    /youtu\.be\/([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/,
  ];
  for (const re of patterns) {
    const m = url.match(re);
    if (m) return m[1];
  }
  return null;
}

/* ════════════════════════════════════════
   VIEWS
════════════════════════════════════════ */
function showView(name) {
  ['view-erro', 'view-player'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.display = 'none'; el.classList.remove('active'); }
  });
  const el = document.getElementById('view-' + name);
  if (el) { el.style.display = 'flex'; el.classList.add('active'); }
}

function mostrarErro(iconKey, titulo, sub) {
  document.getElementById('erro-icon').innerHTML = ICONS[iconKey] || ICONS.warn;
  document.getElementById('erro-title').textContent = titulo;
  document.getElementById('erro-sub').textContent   = sub;
  showView('erro');
}

/* ════════════════════════════════════════
   AUTH — via navbar.js
════════════════════════════════════════ */
window.addEventListener('assent:authchange', async (e) => {
  if (_authProcessado) return;
  _authProcessado = true;

  document.getElementById('loading-screen').classList.add('hide');
  const { user } = e.detail;

  if (!user) { window.location.href = '/membros'; return; }
  _user = user;

  initSidebar();

  // Verifica licença
  try {
    const licSnap = await window._getDoc(window._doc(window._db, 'licencas', user.uid));
    _licenca = licSnap.exists() ? licSnap.data() : {};
  } catch (err) {
    mostrarErro('warn', 'Erro de verificação', 'Não foi possível verificar seu acesso. Tente novamente.');
    return;
  }

  if (!_licenca.clienteCurso) {
    mostrarErro('lock', 'Acesso Restrito', 'Você não tem acesso a este conteúdo. Entre em contato com a ASSENT.');
    return;
  }

  // Pega ID do curso na URL
  const params  = new URLSearchParams(window.location.search);
  const cursoId = params.get('id');

  if (!cursoId) {
    mostrarErro('search', 'Curso não especificado', 'Nenhum ID de curso foi informado na URL.');
    return;
  }

  await iniciarCurso(cursoId);
});

/* ════════════════════════════════════════
   INICIAR CURSO
════════════════════════════════════════ */
async function iniciarCurso(cursoId) {
  try {
    const cursoSnap = await window._getDoc(window._doc(window._db, 'cursos', cursoId));
    if (!cursoSnap.exists()) {
      mostrarErro('inbox', 'Curso não encontrado', 'O curso que você tentou acessar não existe ou foi removido.');
      return;
    }

    _curso = { id: cursoId, ...cursoSnap.data() };

    if (_curso.ativo === false) {
      mostrarErro('tool', 'Curso indisponível', 'Este curso está temporariamente fora do ar. Volte em breve.');
      return;
    }

    document.title = `${_curso.titulo} — ASSENT AGÊNCIA`;
    document.getElementById('player-curso-titulo').textContent = _curso.titulo;

    const aulasSnap = await window._getDocs(
      window._query(
        window._collection(window._db, 'cursos', cursoId, 'aulas'),
        window._orderBy('ordem')
      )
    );
    _aulas = aulasSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    if (_aulas.length === 0) {
      document.getElementById('sidebar-header').textContent = '0 aulas';
      document.getElementById('aulas-sidebar-list').innerHTML =
        `<div style="padding:30px 20px;text-align:center;color:var(--muted);font-size:.82rem;line-height:1.6;">
          Nenhuma aula disponível ainda.
        </div>`;
      document.getElementById('placeholder-msg').textContent = 'Este curso ainda não tem aulas.';
      showView('player');
      return;
    }

    // Carrega progresso
    try {
      const progSnap = await window._getDoc(
        window._doc(window._db, 'progresso', `${_user.uid}_${cursoId}`)
      );
      if (progSnap.exists()) {
        _progresso = { aulasCompletas: [], aulaAtual: null, ...progSnap.data() };
      }
    } catch (_) { /* progresso é opcional */ }

    renderSidebar();
    showView('player');

    const aulaInicial = _aulas.find(a => a.id === _progresso.aulaAtual) || _aulas[0];
    selecionarAula(aulaInicial);

  } catch (err) {
    console.error('[Curso] Erro ao iniciar:', err);
    mostrarErro('warn', 'Erro ao carregar', 'Ocorreu um erro ao carregar o curso. Tente recarregar a página.');
  }
}

/* ════════════════════════════════════════
   RENDER SIDEBAR
════════════════════════════════════════ */
function renderSidebar() {
  const listEl   = document.getElementById('aulas-sidebar-list');
  const headerEl = document.getElementById('sidebar-header');
  const total      = _aulas.length;
  const concluidas = (_progresso.aulasCompletas || []).length;

  headerEl.textContent = `${total} aula${total !== 1 ? 's' : ''} · ${concluidas} concluída${concluidas !== 1 ? 's' : ''}`;

  listEl.innerHTML = _aulas.map((a, i) => {
    const concluida = (_progresso.aulasCompletas || []).includes(a.id);
    const ativa     = _aulaAtiva?.id === a.id;
    return `
    <div class="aula-sidebar-item ${ativa ? 'ativa' : ''} ${concluida ? 'completa' : ''}"
         id="aula-sidebar-${a.id}"
         onclick="selecionarAula(${JSON.stringify(JSON.stringify(a))})">
      <div class="aula-sidebar-num">
        ${concluida
          ? `<svg viewBox="0 0 24 24" fill="none" width="14" height="14"><polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>`
          : (i + 1)}
      </div>
      <div class="aula-sidebar-info">
        <div class="aula-sidebar-titulo">${a.titulo}</div>
        ${a.duracao ? `<div class="aula-sidebar-meta">${a.duracao}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  atualizarBarra();
}

/* ════════════════════════════════════════
   SELECIONAR AULA
════════════════════════════════════════ */
function selecionarAula(aulaOrStr) {
  const aula = typeof aulaOrStr === 'string' ? JSON.parse(aulaOrStr) : aulaOrStr;
  _aulaAtiva = aula;

  const iframe      = document.getElementById('youtube-player');
  const placeholder = document.getElementById('video-placeholder');
  const ytId        = extrairYouTubeId(aula.videoUrl);

  if (ytId) {
    iframe.src = `https://www.youtube-nocookie.com/embed/${ytId}?rel=0&modestbranding=1&color=white`;
    iframe.style.display = 'block';
    placeholder.style.display = 'none';
  } else {
    iframe.src = '';
    iframe.style.display = 'none';
    placeholder.style.display = 'flex';
    document.getElementById('placeholder-msg').textContent = 'Vídeo não disponível.';
  }

  const concluida = (_progresso.aulasCompletas || []).includes(aula.id);
  document.getElementById('aula-info-breadcrumb').textContent = _curso?.titulo || '';
  document.getElementById('aula-info-titulo').textContent     = aula.titulo || '';
  document.getElementById('aula-info-desc').textContent       = aula.descricao || '';

  const btn = document.getElementById('btn-complete');
  btn.disabled = false;
  if (concluida) {
    btn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><polyline points="20 6 9 17 4 12"/></svg>
      Concluída`;
    btn.classList.add('done');
  } else {
    btn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><polyline points="20 6 9 17 4 12"/></svg>
      Marcar como concluída`;
    btn.classList.remove('done');
  }

  const idx = _aulas.findIndex(a => a.id === aula.id);
  document.getElementById('btn-prev').disabled = idx <= 0;
  document.getElementById('btn-next').disabled = idx >= _aulas.length - 1;

  document.querySelectorAll('.aula-sidebar-item').forEach(el => el.classList.remove('ativa'));
  const itemEl = document.getElementById('aula-sidebar-' + aula.id);
  if (itemEl) {
    itemEl.classList.add('ativa');
    itemEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  if (window.innerWidth <= 900) fecharSidebarMobile();
  salvarProgresso();
}

/* ════════════════════════════════════════
   MARCAR COMO CONCLUÍDA
════════════════════════════════════════ */
async function marcarConcluida() {
  if (!_aulaAtiva) return;

  const id        = _aulaAtiva.id;
  const concluida = (_progresso.aulasCompletas || []).includes(id);

  if (concluida) {
    _progresso.aulasCompletas = _progresso.aulasCompletas.filter(x => x !== id);
  } else {
    _progresso.aulasCompletas = [...(_progresso.aulasCompletas || []), id];
  }

  try {
    await window._setDoc(
      window._doc(window._db, 'progresso', `${_user.uid}_${_curso.id}`),
      {
        uid:            _user.uid,
        cursoId:        _curso.id,
        aulasCompletas: _progresso.aulasCompletas,
        updatedAt:      window._serverTimestamp()
      },
      { merge: true }
    );
    renderSidebar();
    selecionarAula(_aulaAtiva);
    showToast(concluida ? 'Aula desmarcada.' : 'Aula concluída!', concluida ? '' : 'ok');
  } catch (err) {
    console.error('[Curso] Erro ao salvar progresso:', err);
    showToast('Erro ao salvar progresso.', 'err');
  }
}

/* ════════════════════════════════════════
   SALVAR PROGRESSO
════════════════════════════════════════ */
async function salvarProgresso() {
  if (!_user || !_curso || !_aulaAtiva) return;
  try {
    await window._setDoc(
      window._doc(window._db, 'progresso', `${_user.uid}_${_curso.id}`),
      {
        uid:       _user.uid,
        cursoId:   _curso.id,
        aulaAtual: _aulaAtiva.id,
        updatedAt: window._serverTimestamp()
      },
      { merge: true }
    );
  } catch (_) { /* silencioso */ }
}

/* ════════════════════════════════════════
   BARRA DE PROGRESSO
════════════════════════════════════════ */
function atualizarBarra() {
  const total = _aulas.length;
  const done  = (_progresso.aulasCompletas || []).length;
  const pct   = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('player-progress-fill').style.width = pct + '%';
  document.getElementById('player-progress-pct').textContent  = pct + '%';
}

/* ════════════════════════════════════════
   NAVEGAÇÃO PREV / NEXT
════════════════════════════════════════ */
function navAula(dir) {
  const idx  = _aulas.findIndex(a => a.id === _aulaAtiva?.id);
  const next = _aulas[idx + dir];
  if (next) selecionarAula(next);
}

/* ════════════════════════════════════════
   SIDEBAR MOBILE
════════════════════════════════════════ */
document.getElementById('btn-toggle-sidebar').addEventListener('click', () => {
  _sidebarOpen = !_sidebarOpen;
  document.getElementById('player-sidebar').classList.toggle('open', _sidebarOpen);
});

function fecharSidebarMobile() {
  document.getElementById('player-sidebar').classList.remove('open');
  _sidebarOpen = false;
}

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.className = 'toast' + (type ? ' ' + type : '');
  document.getElementById('toast-icon').innerHTML =
    type === 'err'
      ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>`
      : ICONS.check;
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3200);
}
</script>
