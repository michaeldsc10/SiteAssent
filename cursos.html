<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cursos — ASSENT AGÊNCIA</title>
<script type="module" src="/navbar.js"></script>
<!--
  cursos.html — ASSENT Agência
  ─────────────────────────────
  Versão adaptada: lê da coleção `cursos` (Firestore).
  Requer: navbar.js (que expõe window._db, window._getDocs, etc.)
  Ao clicar em um curso → redireciona para /curso.html?id=CURSO_ID
-->
<script type="module" src="/navbar.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
/* ════════════════════════════════════════
   TOKENS DE DESIGN
════════════════════════════════════════ */
:root {
  --bg:        #111111;
  --surface:   #1a1a1a;
  --surface2:  #222222;
  --surface3:  #2a2a2a;
  --gold:      #F5A623;
  --gold-dark: #E09820;
  --gold-glow: rgba(245,166,35,0.18);
  --white:     #FFFFFF;
  --muted:     #777777;
  --muted2:    #555555;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --success:   #4CAF50;
  --danger:    #e05555;
  --heading:   'Montserrat', sans-serif;
  --body:      'Inter', sans-serif;
  --nav-h:     68px;
}

*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
  background:var(--bg); color:var(--white);
  font-family:var(--body); min-height:100vh;
  overflow-x:hidden; line-height:1.6;
  padding-top: var(--nav-h);
}
::-webkit-scrollbar{ width:5px; }
::-webkit-scrollbar-track{ background:var(--bg); }
::-webkit-scrollbar-thumb{ background:var(--surface3); border-radius:3px; }

/* ── VIEWS ── */
.view{ display:none; min-height:calc(100vh - var(--nav-h)); }
.view.active{ display:block; }

/* ── LOADING SCREEN ── */
#loading-screen{
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:20px;
  transition:opacity .4s ease;
}
#loading-screen.hide{ opacity:0; pointer-events:none; }
.loading-logo{ font-family:var(--heading); font-weight:800; font-size:1.4rem; letter-spacing:.06em; }
.loading-logo span{ color:var(--gold); }
.spinner{
  width:36px; height:36px;
  border:3px solid var(--surface3); border-top-color:var(--gold);
  border-radius:50%; animation:spin .8s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

/* ── TOAST ── */
.toast{
  position:fixed; bottom:24px; right:24px; z-index:9999;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:10px; padding:14px 20px;
  font-size:.875rem; color:var(--white);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  transform:translateY(20px); opacity:0;
  transition:all .3s ease; pointer-events:none;
  display:flex; align-items:center; gap:10px;
}
.toast.show{ transform:translateY(0); opacity:1; }
.toast.ok{ border-color:rgba(76,175,80,.3); }
.toast.err{ border-color:rgba(224,85,85,.3); }

/* ══════════════════════════════════════
   VIEW: NEGADO (sem licença)
══════════════════════════════════════ */
#view-negado{
  display:none; align-items:center; justify-content:center;
  flex-direction:column; gap:0; text-align:center;
  padding:60px 24px;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(245,166,35,.06) 0%, transparent 60%),
    var(--bg);
}
#view-negado.active{ display:flex; }

.negado-icon{
  width:80px; height:80px; border-radius:50%;
  background:rgba(245,166,35,.08); border:1px solid rgba(245,166,35,.2);
  display:flex; align-items:center; justify-content:center;
  font-size:2rem; margin-bottom:28px;
}
.negado-title{
  font-family:var(--heading); font-size:1.6rem; font-weight:800;
  letter-spacing:-.02em; margin-bottom:12px;
}
.negado-sub{
  color:var(--muted); font-size:.95rem; max-width:420px;
  margin-bottom:36px; line-height:1.7;
}
.btn-negado{
  display:inline-flex; align-items:center; gap:10px;
  padding:14px 32px; border-radius:50px;
  background:var(--gold); color:#111;
  font-family:var(--heading); font-size:.85rem; font-weight:700;
  letter-spacing:.07em; text-transform:uppercase;
  text-decoration:none; transition:all .2s;
  box-shadow:0 0 30px var(--gold-glow);
}
.btn-negado:hover{ background:var(--gold-dark); transform:translateY(-2px); }

/* ══════════════════════════════════════
   VIEW: LISTA DE CURSOS
══════════════════════════════════════ */
.lista-hero{
  padding:56px 40px 40px;
  max-width:1200px; margin:0 auto;
  display:flex; align-items:flex-end; justify-content:space-between;
  flex-wrap:wrap; gap:20px;
  border-bottom:1px solid var(--border);
}
.lista-hero-text h1{
  font-family:var(--heading); font-size:2rem; font-weight:800;
  letter-spacing:-.03em; line-height:1.15;
}
.lista-hero-text h1 span{ color:var(--gold); }
.lista-hero-text p{ color:var(--muted); font-size:.9rem; margin-top:8px; }

.cursos-body{ max-width:1200px; margin:0 auto; padding:40px; }

/* Grid de cards */
.cursos-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
  gap:24px;
}

/* Card de curso */
.curso-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px; overflow:hidden;
  cursor:pointer;
  transition:border-color .2s, transform .2s, box-shadow .2s;
  position:relative; display:block;
  text-decoration:none; color:inherit;
}
.curso-card:hover{
  border-color:rgba(245,166,35,.35);
  transform:translateY(-4px);
  box-shadow:0 16px 48px rgba(0,0,0,.3), 0 0 0 1px rgba(245,166,35,.1);
}

.curso-thumb{
  width:100%; aspect-ratio:16/9;
  background:var(--surface2); position:relative; overflow:hidden;
}
.curso-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
.curso-thumb-placeholder{
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
  color:var(--muted2); font-size:2.5rem;
}
.curso-play-overlay{
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,.4); opacity:0; transition:opacity .2s;
}
.curso-card:hover .curso-play-overlay{ opacity:1; }
.play-circle{
  width:52px; height:52px; border-radius:50%;
  background:var(--gold); display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 30px rgba(245,166,35,.5);
}
.play-circle svg{ width:20px; height:20px; fill:#111; margin-left:3px; }

.curso-card-body{ padding:22px; }
.curso-badges{ display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.badge{
  font-size:.68rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase;
  padding:4px 10px; border-radius:100px;
}
.badge-categoria{ background:rgba(245,166,35,.1); color:var(--gold); border:1px solid rgba(245,166,35,.2); }
.badge-nivel{ background:rgba(255,255,255,.05); color:var(--muted); border:1px solid var(--border2); }

.curso-titulo{
  font-family:var(--heading); font-size:1rem; font-weight:700;
  letter-spacing:-.01em; margin-bottom:8px; line-height:1.4;
}
.curso-desc{
  color:var(--muted); font-size:.82rem; line-height:1.6; margin-bottom:18px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.curso-meta{
  display:flex; align-items:center; gap:16px;
  font-size:.78rem; color:var(--muted);
}
.curso-meta span{ display:flex; align-items:center; gap:5px; }
.curso-meta svg{ width:13px; height:13px; opacity:.7; }

/* Estado vazio */
.empty-state{
  grid-column:1/-1;
  text-align:center; padding:80px 20px;
  border:1px dashed var(--border2); border-radius:16px;
}
.empty-state .icon{ font-size:3rem; margin-bottom:20px; }
.empty-state h3{ font-family:var(--heading); font-size:1.1rem; font-weight:700; margin-bottom:8px; }
.empty-state p{ color:var(--muted); font-size:.875rem; }

/* ── RESPONSIVE ── */
@media (max-width:768px) {
  .lista-hero{ padding:36px 20px 28px; }
  .cursos-body{ padding:24px 20px; }
  .lista-hero-text h1{ font-size:1.5rem; }
}
</style>
</head>
<body>
<assent-navbar></assent-navbar>
<!-- Loading screen -->
<div id="loading-screen">
  <div class="loading-logo">ASSENT <span>CURSOS</span></div>
  <div class="spinner"></div>
</div>

<!-- ══════════════════════════════════════
     VIEW: ACESSO NEGADO
══════════════════════════════════════ -->
<div id="view-negado" class="view">
  <div class="negado-icon">🔒</div>
  <div class="negado-title">Acesso Restrito</div>
  <div class="negado-sub">
    Esta área é exclusiva para clientes ASSENT com acesso ao módulo de cursos.
    Entre em contato conosco para saber mais.
  </div>
  <a href="https://wa.me/5500000000000" class="btn-negado" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.134.558 4.133 1.535 5.867L0 24l6.295-1.508A11.954 11.954 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818c-1.943 0-3.77-.525-5.338-1.44l-.382-.227-3.96.949.993-3.854-.249-.395A9.785 9.785 0 012.182 12C2.182 6.59 6.59 2.182 12 2.182c5.41 0 9.818 4.408 9.818 9.818S17.41 21.818 12 21.818z"/></svg>
    Falar com a ASSENT
  </a>
</div>

<!-- ══════════════════════════════════════
     VIEW: LISTA DE CURSOS
══════════════════════════════════════ -->
<div id="view-lista" class="view">
  <div class="lista-hero">
    <div class="lista-hero-text">
      <h1>Seus <span>Cursos</span></h1>
      <p id="lista-sub">Carregando...</p>
    </div>
  </div>

  <div class="cursos-body">
    <div class="cursos-grid" id="cursos-grid">
      <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted);">
        <div class="spinner" style="margin:0 auto 16px;"></div>
        Carregando cursos...
      </div>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast">
  <span id="toast-icon">✓</span>
  <span id="toast-msg"></span>
</div>

<script>
/* ════════════════════════════════════════
   ESTADO
════════════════════════════════════════ */
let _user    = null;
let _licenca = {};
let _authJaProcessado = false;

/* ════════════════════════════════════════
   HELPER: YouTube ID
════════════════════════════════════════ */
function extrairYouTubeId(url) {
  if (!url) return null;
  const patterns = [
    /youtu\.be\/([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
  ];
  for (const re of patterns) {
    const m = url.match(re);
    if (m) return m[1];
  }
  return null;
}

/* ════════════════════════════════════════
   VIEWS
════════════════════════════════════════ */
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + name);
  if (el) el.classList.add('active');
  window.scrollTo({ top: 0 });
}

/* ════════════════════════════════════════
   AUTH — via navbar.js
════════════════════════════════════════ */
window.addEventListener('assent:authchange', async (e) => {
  if (_authJaProcessado) return;
  _authJaProcessado = true;

  document.getElementById('loading-screen').classList.add('hide');
  const { user } = e.detail;

  // Não autenticado → redireciona para login
  if (!user) {
    window.location.href = '/membros';
    return;
  }

  _user = user;

  // Verifica licença clienteCurso
  try {
    const licSnap = await window._getDoc(window._doc(window._db, 'licencas', user.uid));
    _licenca = licSnap.exists() ? licSnap.data() : {};
  } catch (err) {
    console.error('[Cursos] Erro ao verificar licença:', err);
    showView('negado');
    return;
  }

  if (!_licenca.clienteCurso) {
    showView('negado');
    return;
  }

  // Licença OK → carrega cursos
  await carregarCursos();
  showView('lista');
});

/* ════════════════════════════════════════
   CARREGAR CURSOS DO FIRESTORE
════════════════════════════════════════ */
async function carregarCursos() {
  const grid = document.getElementById('cursos-grid');

  try {
    const snap = await window._getDocs(
      window._query(
        window._collection(window._db, 'cursos'),
        window._where('ativo', '==', true),
        window._orderBy('ordem')
      )
    );

    const cursos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderCursos(cursos);
  } catch (err) {
    console.error('[Cursos] Erro ao carregar:', err);
    grid.innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <h3>Erro ao carregar cursos</h3>
        <p>Verifique sua conexão e recarregue a página.</p>
      </div>`;
  }
}

/* ════════════════════════════════════════
   RENDERIZAR CARDS DE CURSOS
════════════════════════════════════════ */
function renderCursos(cursos) {
  const grid = document.getElementById('cursos-grid');
  const sub  = document.getElementById('lista-sub');

  if (cursos.length === 0) {
    sub.textContent = 'Nenhum curso disponível';
    grid.innerHTML = `
      <div class="empty-state">
        <div class="icon">📚</div>
        <h3>Em breve</h3>
        <p>Os cursos serão disponibilizados em breve.<br>Aguarde novidades!</p>
      </div>`;
    return;
  }

  sub.textContent = `${cursos.length} curso${cursos.length > 1 ? 's' : ''} disponível${cursos.length > 1 ? 'is' : ''}`;

  grid.innerHTML = cursos.map(c => {
    const total    = c.totalAulas || 0;

    // Thumb: usa URL cadastrada ou thumbnail do YouTube (se disponível)
    const thumbSrc = c.thumbnail || '';

    return `
    <a class="curso-card" href="/curso.html?id=${c.id}" aria-label="Abrir curso: ${c.titulo}">
      <div class="curso-thumb">
        ${thumbSrc
          ? `<img src="${thumbSrc}" alt="${c.titulo}" loading="lazy"
                  onerror="this.parentElement.innerHTML='<div class=\\"curso-thumb-placeholder\\">🎬</div>'">`
          : `<div class="curso-thumb-placeholder">🎬</div>`}
        <div class="curso-play-overlay">
          <div class="play-circle">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
        </div>
      </div>

      <div class="curso-card-body">
        <div class="curso-badges">
          ${c.categoria ? `<span class="badge badge-categoria">${c.categoria}</span>` : ''}
          ${c.nivel     ? `<span class="badge badge-nivel">${c.nivel}</span>`         : ''}
        </div>

        <div class="curso-titulo">${c.titulo}</div>

        ${c.descricao
          ? `<div class="curso-desc">${c.descricao}</div>`
          : ''}

        <div class="curso-meta">
          ${total > 0 ? `
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/>
              </svg>
              ${total} aula${total > 1 ? 's' : ''}
            </span>` : ''}
          ${c.duracao ? `
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
              </svg>
              ${c.duracao}
            </span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');
}

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.className = 'toast' + (type ? ' ' + type : '');
  document.getElementById('toast-icon').textContent = type === 'err' ? '⚠' : '✓';
  document.getElementById('toast-msg').textContent  = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}
</script>
</body>
</html>
